<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Konekto · Email Templates</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #04060B; font-family: "Inter", system-ui, sans-serif; color: #F5F8FF; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../components/design-canvas.jsx"></script>
<script type="text/babel" src="../components/emails.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
function EmailApp() {
  const { DesignCanvas: DC, DCSection: DS, DCArtboard: DA } = window;
  const W = 480;   // display width
  return (
    <DC
      title="Konekto · Email Templates"
      subtitle="Designed at 640px (industry-standard). Five reusable layouts covering onboarding, transactional, marketing & digest needs. Click any to open fullscreen."
    >
      <DS id="onboarding" title="Onboarding & lifecycle" subtitle="First-touch and welcome flows">
        <DA id="welcome" label="01 · Welcome" width={W} height={1500}>
          <WelcomeEmail/>
        </DA>
        <DA id="confirm" label="02 · RSVP confirmation" width={W} height={1420}>
          <ConfirmEmail/>
        </DA>
        <DA id="circle-accept" label="03 · Circle acceptance" width={W} height={1640}>
          <CircleAcceptEmail/>
        </DA>
      </DS>

      <DS id="campaigns" title="Campaigns & marketing" subtitle="Announcement-style sends">
        <DA id="event" label="03 · Event invitation" width={W} height={1620}>
          <EventEmail/>
        </DA>
        <DA id="deal" label="04 · Deal / offer" width={W} height={1500}>
          <DealEmail/>
        </DA>
      </DS>

      <DS id="recurring" title="Recurring" subtitle="Newsletter & digest">
        <DA id="digest" label="05 · Weekly digest" width={W} height={1700}>
          <DigestEmail/>
        </DA>
      </DS>
    </DC>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<EmailApp/>);
</script>

</body>
</html>
